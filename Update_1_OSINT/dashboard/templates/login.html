<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT ADVANTAGE - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(18, 24, 38, 0.65);
            --card-border: rgba(255, 255, 255, 0.08);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --accent-purple: #8b5cf6;
            --accent-cyan: #06b6d4;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --input-bg: rgba(15, 23, 42, 0.6);
            --input-border: rgba(255, 255, 255, 0.1);
            --danger: #ef4444;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 35%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15), transparent 35%);
        }

        /* Animated Grid Background */
        .bg-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 200vw;
            height: 200vh;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
            animation: gridMove 20s linear infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes gridMove {
            0% {
                transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px);
            }

            100% {
                transform: perspective(500px) rotateX(60deg) translateY(40px) translateZ(-200px);
            }
        }

        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 2rem;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .brand-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .brand-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 1.25rem;
            background: linear-gradient(135deg, var(--primary), var(--accent-purple));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4);
            animation: pulseGlow 3s infinite;
        }

        @keyframes pulseGlow {
            0% {
                box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
            }

            50% {
                box-shadow: 0 0 30px rgba(139, 92, 246, 0.6);
            }

            100% {
                box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
            }
        }

        .brand-title {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin-bottom: 0.25rem;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-subtitle {
            font-size: 0.875rem;
            color: var(--accent-cyan);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* Role Selector */
        .role-selector {
            display: flex;
            background: var(--input-bg);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 2rem;
            border: 1px solid var(--input-border);
            position: relative;
        }

        .role-option {
            flex: 1;
            text-align: center;
            padding: 0.75rem 0;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            position: relative;
            z-index: 2;
        }

        .role-option.active {
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
        }

        .role-indicator {
            position: absolute;
            top: 4px;
            bottom: 4px;
            width: calc(33.333% - 4px);
            background: var(--primary);
            border-radius: 8px;
            transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
            z-index: 1;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .role-selector[data-active="viewer"] .role-indicator {
            transform: translateX(2px);
            background: var(--success);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }

        .role-selector[data-active="analyst"] .role-indicator {
            transform: translateX(100%);
            left: 4px;
            background: var(--primary);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .role-selector[data-active="admin"] .role-indicator {
            transform: translateX(200%);
            left: 6px;
            background: var(--accent-purple);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
        }

        .form-group {
            margin-bottom: 1.25rem;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            margin-left: 0.25rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1rem;
            transition: color 0.3s;
        }

        .form-input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 10px;
            padding: 0.875rem 1rem 0.875rem 3.25rem;
            color: #fff;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input::placeholder {
            color: #475569;
        }

        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        .form-input:focus+.input-icon,
        .input-wrapper:focus-within .input-icon {
            color: var(--primary);
        }

        .demo-notice {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.8rem;
            color: var(--accent-cyan);
            background: rgba(6, 182, 212, 0.1);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(6, 182, 212, 0.2);
        }

        .error-message {
            color: var(--danger);
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
            background: rgba(239, 68, 68, 0.1);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid rgba(239, 68, 68, 0.2);
            text-align: center;
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            letter-spacing: 0.5px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(59, 130, 246, 0.6);
        }

        .submit-btn:active {
            transform: translateY(1px);
        }

        /* Shine effect */
        .submit-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transform: skewX(-20deg);
            transition: left 0.5s;
        }

        .submit-btn:hover::after {
            left: 150%;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 2rem 1.5rem;
            }

            .brand-icon {
                width: 48px;
                height: 48px;
                font-size: 24px;
            }

            .brand-title {
                font-size: 1.25rem;
            }
        }
    </style>
</head>

<body>
    <div class="bg-grid"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="brand-header">
                <div class="brand-icon">
                    <i class="fas fa-shield-halved"></i>
                </div>
                <h1 class="brand-title">OSINT ADVANTAGE</h1>
                <p class="brand-subtitle">Intelligence Center</p>
            </div>

            <form id="loginForm" method="POST" action="{{ url_for('login') }}">
                <!-- Smart Role Selector -->
                <div class="role-selector" id="roleSelector" data-active="viewer">
                    <div class="role-indicator"></div>
                    <div class="role-option active" data-role="viewer">
                        <i class="fas fa-eye" style="margin-right: 4px;"></i> Viewer
                    </div>
                    <div class="role-option" data-role="analyst">
                        <i class="fas fa-microscope" style="margin-right: 4px;"></i> Analyst
                    </div>
                    <div class="role-option" data-role="admin">
                        <i class="fas fa-crown" style="margin-right: 4px;"></i> Admin
                    </div>
                </div>
                <input type="hidden" id="roleInput" name="role" value="viewer">

                {% if error %}
                <div class="error-message" style="display: block;">
                    <i class="fas fa-exclamation-circle" style="margin-right: 4px;"></i> {{ error }}
                </div>
                {% endif %}
                <div class="error-message" id="jsErrorMessage"></div>

                <div class="form-group">
                    <label class="form-label">Identifier</label>
                    <div class="input-wrapper">
                        <input type="text" class="form-input" name="username" placeholder="operator_id" required
                            autocomplete="off">
                        <i class="fas fa-user input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Passcode</label>
                    <div class="input-wrapper">
                        <input type="password" class="form-input" name="password" placeholder="••••••••" required>
                        <i class="fas fa-lock input-icon"></i>
                    </div>
                </div>

                <div class="demo-notice">
                    <i class="fas fa-flask"></i>
                    <span>Demo Mode: All credentials accepted.</span>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    Authenticate <i class="fas fa-arrow-right"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const selector = document.getElementById('roleSelector');
            const options = document.querySelectorAll('.role-option');
            const input = document.getElementById('roleInput');

            // Handle Smart Role Segments
            options.forEach(option => {
                option.addEventListener('click', () => {
                    options.forEach(opt => opt.classList.remove('active'));
                    option.classList.add('active');

                    const role = option.dataset.role;
                    selector.setAttribute('data-active', role);
                    input.value = role;
                });
            });

            // Form validation and smart button UI
            document.getElementById('loginForm').addEventListener('submit', function (e) {
                const username = this.username.value.trim();
                const password = this.password.value.trim();
                const errorMsg = document.getElementById('jsErrorMessage');
                const btn = document.getElementById('submitBtn');

                if (!username || !password) {
                    e.preventDefault();
                    errorMsg.innerHTML = '<i class="fas fa-exclamation-circle" style="margin-right: 4px;"></i> Integrity Check Failed: Missing Credentials.';
                    errorMsg.style.display = 'block';
                } else {
                    // Loading state
                    btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Authenticating...';
                    btn.style.opacity = '0.8';
                }
            });
        });
    </script>
</body>

</html>
